name: verity_api
description: " 📡 The Verity API is a high-performance backend gateway built with Dart Frog. It serves as the secure data engine for both the Mobile Client and the Web Dashboard. "
version: 1.11.0
publish_to: none
homepage: https://github.com/verity-hq
repository: https://github.com/verity-hq/verity-api
documentation: https://github.com/verity-hq/verity-api/wiki
issue_tracker: https://github.com/verity-hq/verity-api/issues
funding:
  - https://github.com/sponsors/verity-hq
topics:
  - flutter
  - flutter-full-app
  - flutter-news-app
  - verity-api
  - flutter-news-app-source-code

environment:
  sdk: ^3.9.0

dependencies:
  asn1lib: ^1.6.5
  collection: ^1.19.1
  core:
    git:
      url: https://github.com/verity-hq/core.git
      ref: 01ddd253e94303d86d9fbcc977acb2019f239fb4
  crypto: ^3.0.7
  dart_frog: ^1.1.0
  dart_jsonwebtoken: ^3.2.0
  dotenv: ^4.2.0
  equatable: ^2.0.7
  intl: ^0.20.2
  jose: ^0.3.3
  json_annotation: ^4.9.0
  logging: ^1.3.0
  meta: ^1.16.0
  mime: ^1.0.6
  mongo_dart: ^0.10.5
  path: ^1.9.1
  pointycastle: ^4.0.0
  shelf_cors_headers: ^0.1.5
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.10.4
  dart_frog_test: ^0.1.2
  json_serializable: ^6.10.0
  mocktail: ^1.0.3
  test: ^1.25.5
  very_good_analysis: ^9.0.0
